apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-celery-worker
  labels:
    app: chatbot
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot
      component: celery-worker
  template:
    metadata:
      labels:
        app: chatbot
        component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ghcr.io/your-org/chatbot-celery:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: chatbot-config
            - secretRef:
                name: chatbot-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-celery-beat
  labels:
    app: chatbot
    component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
      component: celery-beat
  template:
    metadata:
      labels:
        app: chatbot
        component: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: ghcr.io/your-org/chatbot-celery:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: chatbot-config
            - secretRef:
                name: chatbot-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
