apiVersion: v1
kind: Secret
metadata:
  name: chatbot-secrets
type: Opaque
stringData:
  SECRET_KEY: "change-me-to-a-random-secret-key"
  JWT_SECRET_KEY: "change-me-to-a-random-jwt-secret"
  DATABASE_URL: "postgresql+asyncpg://chatbot:chatbot@chatbot-postgres:5432/chatbot"
  REDIS_URL: "redis://chatbot-redis:6379/0"
  CELERY_BROKER_URL: "redis://chatbot-redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://chatbot-redis:6379/2"
  S3_ENDPOINT: "http://chatbot-minio:9000"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  # API Keys - set these via kubectl or external secret management
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
