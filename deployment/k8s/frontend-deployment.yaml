apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-frontend
  labels:
    app: chatbot
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot
      component: frontend
  template:
    metadata:
      labels:
        app: chatbot
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/chatbot-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-frontend
  labels:
    app: chatbot
    component: frontend
spec:
  selector:
    app: chatbot
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatbot-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
spec:
  rules:
    - host: chatbot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatbot-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: chatbot-backend
                port:
                  number: 8000
